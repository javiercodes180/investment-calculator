<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      <h1>💰 Investment Calculator</h1>
      <p>See how your money grows over time</p>

      <div class="form">

        <label>Monthly Investment ($)</label>
        <input type="number" id="monthly" placeholder="e.g. 500" />

        <label>Annual Return (%)</label>
        <input type="number" id="rate" placeholder="e.g. 7" />

        <label>Number of Years</label>
        <input type="number" id="years" placeholder="e.g. 10" />

        <button onclick="calculate()">Calculate</button>

      </div>

      <div class="results" id="results">
        <div class="result-box">
          <span>Total Invested</span>
          <strong id="totalInvested">-</strong>
        </div>
        <div class="result-box">
          <span>Interest Earned</span>
          <strong id="totalInterest">-</strong>
        </div>
        <div class="result-box highlight">
          <span>Final Value</span>
          <strong id="finalValue">-</strong>
        </div>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
